
{% extends 'base.html' %}
{% block title %}Forgot Password — Groom Suite{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">♛</div>
    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-sub">Enter your email and we'll send you a temporary password</p>
    <div class="gold-line"></div>

    <form method="POST" action="{{ url_for('forgot_password') }}">
      <div class="form-field">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn-gold">Send Temporary Password</button>
    </form>

    <p class="auth-footer">
      <a href="{{ url_for('login') }}">← Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
