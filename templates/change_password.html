
{% extends 'base.html' %}
{% block title %}Change Password — Groom Suite{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">♛</div>
    <h1 class="auth-title">Change Password</h1>
    <p class="auth-sub">Choose a new secure password for your account</p>
    <div class="gold-line"></div>

    <form method="POST" action="{{ url_for('change_password') }}">
      <div class="form-field">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="••••••••" required>
      </div>
      <div class="form-field">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-gold">Update Password</button>
    </form>

    <p class="auth-footer">
      <a href="{{ url_for('portal') }}">← Back to My Booking</a>
    </p>
  </div>
</div>
{% endblock %}
